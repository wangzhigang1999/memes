spring:
  application:
    name: memes
  web:
    resources:
      static-locations: [ "classpath:/static/","file:./memes/" ]
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:sqlite:memes.db
    driver-class-name: org.sqlite.JDBC
  sql:
    init:
      mode: always
      schema-locations: classpath:/sql/schema-sqlite.sql

urlPrefix: ${urlPrefix}

token: ${token}